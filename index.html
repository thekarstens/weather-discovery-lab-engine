<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Weather Discovery Lab – Engine</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="./leaflet.css" />
  <style>
    html, body { height: 100%; margin: 0; }
    #app { height: 100%; display: grid; grid-template-rows: auto 1fr; }
    #banner { padding: 10px 14px; background: #0b2237; color: white; display:flex; align-items:center; gap:12px; flex-wrap:wrap;}
    #banner h1 { margin:0; font-size: 18px; letter-spacing: .5px;}
    #banner .sub { font-size: 13px; opacity: .95; }
    #controls { display:flex; align-items:center; gap:10px; margin-left:auto; flex-wrap:wrap;}
    #controls button { cursor:pointer; border:0; border-radius: 8px; padding: 8px 10px; }
    #timeLabel { font-weight: 600; }
    #map { height: 100%; }
    #timeBar { display:flex; align-items:center; gap:10px; padding: 8px 12px; background:#f3f5f7; border-top:1px solid #dde3ea;}
    #timeSlider { width: min(680px, 60vw); }
  </style>
  <script src="./leaflet.js"></script>
</head>
<body>
<div id="app">
  <div id="banner">
    <div>
      <h1 id="titleTop">Loading lesson…</h1>
      <div class="sub" id="drivingQuestion"></div>
    </div>
    <div id="controls">
      <span id="productLabel"></span>
      <span id="timeLabel"></span>
    </div>
  </div>
  <div style="display:grid; grid-template-rows: 1fr auto;">
    <div id="map"></div>
    <div id="timeBar">
      <button id="prevBtn">◀</button>
      <input id="timeSlider" type="range" min="0" max="0" value="0" step="1" />
      <button id="nextBtn">▶</button>
      <span style="margin-left:auto; font-size:12px; opacity:.8;">Tip: open DevTools → Network to see exact 404 paths.</span>
    </div>
  </div>
</div>

<script type="module">
  import { getLessonIdFromURL, loadLessonConfig, formatZToLocal, buildUrlFromPattern } from "./js/lessonLoader.js";

  const DATA_PACK_BASE = "https://thekarstens.github.io/wdl-data-derecho-2022/";
  const lessonId = getLessonIdFromURL("derecho-2022");

  const titleEl = document.getElementById("titleTop");
  const dqEl = document.getElementById("drivingQuestion");
  const productEl = document.getElementById("productLabel");
  const timeEl = document.getElementById("timeLabel");

  const slider = document.getElementById("timeSlider");
  const prevBtn = document.getElementById("prevBtn");
  const nextBtn = document.getElementById("nextBtn");

  let CFG, map, radarOverlay, metarsLayer;
  let overlays = {};
  let radarFrames = null; // optional {timeZ, file/url}
  let timeSteps = []; // Date objects in UTC

    function buildTimeSteps() {
    // If we have an explicit radar frame manifest, drive the slider from that (exact timestamps).
    if (CFG?.layers?.radar?.frames && Array.isArray(CFG?.layers?.radar.frames) && CFG?.layers?.radar.frames.length) {
      return CFG?.layers?.radar.frames.map(f => new Date(f.timeZ));
    }

    const start = new Date(CFG?.time.startZ);
    const end = new Date(CFG?.time.endZ);

    // Prefer minute stepping (derecho / radar loops), fall back to hours
    const stepMin = Number(CFG?.time.stepMinutes || 0);
    const stepH = Number(CFG?.time.stepHours || 1);

    const stepMs = stepMin > 0 ? stepMin * 60 * 1000 : stepH * 3600 * 1000;

    const steps = [];
    for (let d = new Date(start); d <= end; d = new Date(d.getTime() + stepMs)) {
      steps.push(new Date(d));
    }
    return steps;
  }

  async function safeFetchJson(url) {
    const r = await fetch(url, { cache: "no-store" });
    if (!r.ok) return null;
    return await r.json();
  
  // Sweep-reveal helper for radar: draws a wedge and fades in the first frame.
  // This is a lightweight "radar sweep" illusion (not a true sector mask of the image),
  // but it communicates the scanning concept and looks good in-class.
  async function sweepRevealFirstRadarFrame(map, radarOverlay, opts) {
    try {
      const center = opts.center;
      const durationMs = opts.durationMs ?? 1800;
      const beamWidthDeg = opts.beamWidthDeg ?? 14;
      const radiusPx = opts.radiusPx ?? 900;
      const finalOpacity = opts.finalOpacity ?? 0.7;

      // If overlay is already visible, nothing to do.
      radarOverlay.setOpacity(0);

      let angle = 0;
      const start = performance.now();

      // Create a wedge polygon (3 points) that we update each frame.
      const wedge = L.polygon([center, center, center], {
        stroke: false,
        fill: true,
        fillColor: "#ff0",
        fillOpacity: 0.25,
        interactive: false
      }).addTo(map);

      const updateWedge = (deg) => {
        const a1 = (deg - beamWidthDeg / 2) * Math.PI / 180;
        const a2 = (deg + beamWidthDeg / 2) * Math.PI / 180;
        const c = map.latLngToLayerPoint(center);
        const p1 = L.point(c.x + radiusPx * Math.cos(a1), c.y + radiusPx * Math.sin(a1));
        const p2 = L.point(c.x + radiusPx * Math.cos(a2), c.y + radiusPx * Math.sin(a2));
        wedge.setLatLngs([center, map.layerPointToLatLng(p1), map.layerPointToLatLng(p2)]);
      };

      // Keep wedge correct on zoom/pan
      const onMove = () => updateWedge(angle);
      map.on("zoom move", onMove);

      return await new Promise((resolve) => {
        const tick = (now) => {
          const t = Math.min(1, (now - start) / durationMs);
          angle = 360 * t;
          updateWedge(angle);

          // Fade radar in during sweep
          radarOverlay.setOpacity(finalOpacity * t);

          if (t < 1) {
            requestAnimationFrame(tick);
          } else {
            map.off("zoom move", onMove);
            try { map.removeLayer(wedge); } catch (e) {}
            radarOverlay.setOpacity(finalOpacity);
            resolve(true);
          }
        };
        requestAnimationFrame(tick);
      });
    } catch (e) {
      console.warn("[radar] sweepRevealFirstRadarFrame failed; continuing without sweep.", e);
      try { radarOverlay.setOpacity(opts.finalOpacity ?? 0.7); } catch (e2) {}
      return false;
    }
  }

}

  async function init() {
    
    let baseLayers = {};
    let overlayLayers = {};
try {
      CFG = await loadLessonConfig({ dataPackBase: DATA_PACK_BASE, lessonId });
      if (!CFG || typeof CFG !== "object") { throw new Error("Lesson config missing or invalid"); }
      console.log("Loaded lesson config:", CFG);
    } catch (e) {
      console.error(e);
      titleEl.textContent = "Failed to load lesson.json";
      dqEl.textContent = String(e);
      return;
    }

    titleEl.textContent = CFG?.titleTop || CFG?.id || lessonId;
    dqEl.textContent = CFG?.drivingQuestion || "";
    productEl.textContent = CFG?.productLabel ? String(CFG.productLabel).toUpperCase() : "";


      // Resolve lessonBase (where data files live). Prefer CFG.database from lesson.json.
      const lessonBase = (CFG?.database || CFG?.dataBase || "").toString().replace(/\/?$/, "/");
      if (!lessonBase) {
        console.warn("[config] No database/dataBase set in lesson.json; radar/SPC paths may fail.");
      }

    // Map
    map = L.map("map", { zoomControl: true }).setView(
      [CFG?.map?.initialView?.lat ?? 43.55, CFG?.map?.initialView?.lon ?? -96.73],
      CFG?.map?.initialView?.zoom ?? 6
    );

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 18,
      attribution: "© OpenStreetMap"
    }).addTo(map);

    // Time
    timeSteps = buildTimeSteps();
    slider.min = 0;
    slider.max = Math.max(0, timeSteps.length - 1);
    slider.value = 0;

    // Layers control
    baseLayers = {};
    overlayLayers = {};

    // Radar (image sequence)
    let radarOverlay = null;
    if (CFG?.layers?.radar?.framesFile) {
      // Prefer manifest-driven frames (frames.json) so filenames don't need to be computed.
      try {
        const radarCfg = CFG.layers.radar;
        const framesUrl = lessonBase + radarCfg.framesFile.replace(/^\//, "");
        console.log("[radar] framesUrl:", framesUrl);

        const mf = await safeFetchJson(framesUrl);
        if (mf && Array.isArray(mf.frames) && mf.frames.length) {
          // Normalize to { timeZ, file, __url }
          const framesList = mf.frames
            .filter(f => f && (f.timeZ || f.t) && (f.file || f.f))
            .map(f => {
              const timeZ = f.timeZ || f.t;
              const file = f.file || f.f;
              return {
                timeZ,
                file,
                __url: lessonBase + "radar/" + String(file).replace(/^\//, "")
              };
            });

          radarFrames = framesList;

          // Store for clock/slider
          CFG.layers.radar._frames = framesList;
          radarCfg.frames = framesList.map(f => ({ timeZ: f.timeZ, file: f.file }));

          // Bounds: default to Sioux Falls-ish domain; override via radar_bounds.json if present.
          // Priority:
          //  1) frames manifest can carry bounds (recommended) as:
          //       { leaflet_bounds: { southwest:{lat,lon}, northeast:{lat,lon} } }
          //  2) explicit radarCfg.boundsFile (legacy) containing the same shape
          //  3) fallback default
          let bounds = L.latLngBounds([[42.0, -99.5], [46.0, -92.0]]);

          const mfBounds = (mf && mf.leaflet_bounds) ? mf.leaflet_bounds : null;
          const applyBoundsObj = (b) => {
            if (b && b.southwest && b.northeast &&
                isFinite(b.southwest.lat) && isFinite(b.southwest.lon) &&
                isFinite(b.northeast.lat) && isFinite(b.northeast.lon)) {
              bounds = L.latLngBounds([[b.southwest.lat, b.southwest.lon],[b.northeast.lat, b.northeast.lon]]);
              return true;
            }
            return false;
          };

          if (mfBounds && applyBoundsObj(mfBounds)) {
            console.log("[radar] using bounds from frames manifest (leaflet_bounds)");
          } else if (radarCfg.boundsFile) {
            const boundsUrl = lessonBase + radarCfg.boundsFile.replace(/^\//, "");
            console.log("[radar] boundsUrl:", boundsUrl);
            const b = await safeFetchJson(boundsUrl);
            if (!applyBoundsObj(b)) {
              console.warn("[radar] boundsFile present but invalid JSON shape. Using default bounds.");
            }
          }

          // Build overlay
 and add first frame immediately
          const first = framesList[0];
          if (first && first.__url) {
            const targetOpacity = (radarCfg.opacity ?? 0.7);

            // Start with 0 opacity; we will "sweep-reveal" the first frame, then
            // hand off to the normal animation/loop.
            radarOverlay = L.imageOverlay(first.__url, bounds, { opacity: 0, interactive: false });
            radarOverlay.addTo(map);
            overlayLayers[radarCfg.label || "Radar"] = radarOverlay;

            // Optionally lock the map view to the radar domain
            if (radarCfg.lockView === true) {
              map.fitBounds(bounds);
              map.setMaxBounds(bounds.pad(0.2));
            }

            // Sweep-reveal effect for the first frame.
            // This draws a rotating wedge centered near Sioux Falls while we fade in the first image.
            // If you want a different center, set radarCfg.sweepCenter = { lat: ..., lon: ... } in lesson.json.
            await sweepRevealFirstRadarFrame(map, radarOverlay, {
              center: radarCfg.sweepCenter ? L.latLng(radarCfg.sweepCenter.lat, radarCfg.sweepCenter.lon) : L.latLng(43.5446, -96.7311),
              durationMs: radarCfg.sweepDurationMs ?? 1800,
              beamWidthDeg: radarCfg.sweepBeamWidthDeg ?? 14,
              radiusPx: radarCfg.sweepRadiusPx ?? 900,
              finalOpacity: targetOpacity
            });
          } else {
            console.warn("[radar] frames manifest loaded but first frame missing.");
          }
        } else {
          console.warn("[radar] frames.json loaded but has no frames array.");
        }
      } catch (e) {
        console.warn("[radar] failed to initialize radar overlay:", e);
      }
    }

    // METARs (snapshot GeoJSON)
    if (CFG?.layers?.metars?.type === "snapshotGeoJSON") {
      metarsLayer = L.geoJSON(null, {
        pointToLayer: (feat, latlng) => L.circleMarker(latlng, { radius: 3 }),
      });
      overlayLayers["METARs"] = metarsLayer;
      metarsLayer.addTo(map);
    }

    // Generic overlays
    if (Array.isArray(CFG?.layers?.overlays)) {
      for (const o of CFG?.layers?.overlays) {
        if (!o?.url || !o?.name) continue;
        const full = lessonBase + o.url;
        const gj = await safeFetchJson(full);
        if (!gj) { console.warn("Overlay not found:", full); continue; }
        overlays[o.name] = L.geoJSON(gj);
        overlayLayers[o.name] = overlays[o.name];
      }
    }

    L.control.layers(baseLayers, overlayLayers, { collapsed: false }).addTo(map);

    // Wire time controls
    const applyTimeIndex = async (idx) => {
      const dt = timeSteps[idx];
      timeEl.textContent = formatZToLocal(dt.toISOString(), CFG?.time.displayTimezone);

      // radar
      if (radarOverlay) {
        let url = null;
        const rf = CFG?.layers?.radar?._frames || null;
        if (rf && rf[idx] && rf[idx].__url) {
          url = rf[idx].__url;
        } else if (CFG?.layers?.radar?.framePattern) {
          url = lessonBase + buildUrlFromPattern(CFG?.layers?.radar.framePattern, dt);
        }
        if (url) radarOverlay.setUrl(url);
      }

      // metars
      if (metarsLayer && CFG?.layers?.metars?.snapshotPattern) {
        const rel = buildUrlFromPattern(CFG?.layers?.metars.snapshotPattern, dt);
        const url = lessonBase + rel;
        const gj = await safeFetchJson(url);
        metarsLayer.clearLayers();
        if (gj) metarsLayer.addData(gj);
      }
    };

    slider.addEventListener("input", ()=> applyTimeIndex(Number(slider.value)));
    prevBtn.addEventListener("click", ()=> { slider.value = Math.max(0, Number(slider.value)-1); slider.dispatchEvent(new Event("input")); });
    nextBtn.addEventListener("click", ()=> { slider.value = Math.min(Number(slider.max), Number(slider.value)+1); slider.dispatchEvent(new Event("input")); });

    // initial time
    await applyTimeIndex(0);

}

  init();
</script>
</body>
</html>
