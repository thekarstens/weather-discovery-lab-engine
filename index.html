<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Weather Discovery Lab – Engine</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="./leaflet.css" />
  <style>
    html, body { height: 100%; margin: 0; }
    #app { height: 100%; display: grid; grid-template-rows: auto 1fr; }
    #banner { padding: 10px 14px; background: #0b2237; color: white; display:flex; align-items:center; gap:12px; flex-wrap:wrap;}
    #banner h1 { margin:0; font-size: 18px; letter-spacing: .5px;}
    #banner .sub { font-size: 13px; opacity: .95; }
    #controls { display:flex; align-items:center; gap:10px; margin-left:auto; flex-wrap:wrap;}
    #controls button { cursor:pointer; border:0; border-radius: 8px; padding: 8px 10px; }
    #timeLabel { font-weight: 600; }
    #map { height: 100%; }
    #timeBar { display:flex; align-items:center; gap:10px; padding: 8px 12px; background:#f3f5f7; border-top:1px solid #dde3ea;}
    #timeSlider { width: min(680px, 60vw); }
  </style>
  <script src="./leaflet.js"></script>
</head>
<body>
<div id="app">
  <div id="banner">
    <div>
      <h1 id="titleTop">Loading lesson…</h1>
      <div class="sub" id="drivingQuestion"></div>
    </div>
    <div id="controls">
      <span id="productLabel"></span>
      <span id="timeLabel"></span>
    </div>
  </div>
  <div style="display:grid; grid-template-rows: 1fr auto;">
    <div id="map"></div>
    <div id="timeBar">
      <button id="prevBtn">◀</button>
      <input id="timeSlider" type="range" min="0" max="0" value="0" step="1" />
      <button id="nextBtn">▶</button>
      <span style="margin-left:auto; font-size:12px; opacity:.8;">Tip: open DevTools → Network to see exact 404 paths.</span>
    </div>
  </div>
</div>

<script type="module">
  import { getLessonIdFromURL, loadLessonConfig, formatZToLocal, buildUrlFromPattern } from "./js/lessonLoader.js";

  const DATA_PACK_BASE = "https://thekarstens.github.io/wdl-data-derecho-2022/";
  const lessonId = getLessonIdFromURL("derecho-2022");

  const titleEl = document.getElementById("titleTop");
  const dqEl = document.getElementById("drivingQuestion");
  const productEl = document.getElementById("productLabel");
  const timeEl = document.getElementById("timeLabel");

  const slider = document.getElementById("timeSlider");
  const prevBtn = document.getElementById("prevBtn");
  const nextBtn = document.getElementById("nextBtn");

  let CFG, map, radarOverlay, metarsLayer;
  let RADAR_FRAMES = null;
  let overlays = {};
  let radarFrames = null; // optional {timeZ, file/url}
  let timeSteps = []; // Date objects in UTC

    function buildTimeSteps() {
    // If we have an explicit radar frame manifest, drive the slider from that (exact timestamps).
    if (CFG.layers?.radar?.frames && Array.isArray(CFG.layers.radar.frames) && CFG.layers.radar.frames.length) {
      return CFG.layers.radar.frames.map(f => new Date(f.timeZ));
    }

    const start = new Date(CFG.time.startZ);
    const end = new Date(CFG.time.endZ);

    // Prefer minute stepping (derecho / radar loops), fall back to hours
    const stepMin = Number(CFG.time.stepMinutes || 0);
    const stepH = Number(CFG.time.stepHours || 1);

    const stepMs = stepMin > 0 ? stepMin * 60 * 1000 : stepH * 3600 * 1000;

    const steps = [];
    for (let d = new Date(start); d <= end; d = new Date(d.getTime() + stepMs)) {
      steps.push(new Date(d));
    }
    return steps;
  }

  async function safeFetchJson(url) {
    const r = await fetch(url, { cache: "no-store" });
    if (!r.ok) return null;
    return await r.json();
  }

  async function init() {
    try {
      CFG = await loadLessonConfig({ dataPackBase: DATA_PACK_BASE, lessonId });
      console.log("Loaded lesson config:", CFG);
    } catch (e) {
      console.error(e);
      titleEl.textContent = "Failed to load lesson.json";
      dqEl.textContent = String(e);
      return;
    }

    titleEl.textContent = CFG.titleTop || CFG.id || lessonId;
    dqEl.textContent = CFG.drivingQuestion || "";
    productEl.textContent = CFG.productLabel ? String(CFG.productLabel).toUpperCase() : "";

    // Map
    map = L.map("map", { zoomControl: true }).setView(
      [CFG.map?.initialView?.lat ?? 43.55, CFG.map?.initialView?.lon ?? -96.73],
      CFG.map?.initialView?.zoom ?? 6
    );

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 18,
      attribution: "© OpenStreetMap"
    }).addTo(map);

    // Radar frames manifest (recommended for 5–10 min radar loops)
    if (CFG.layers?.radar?.type === "imageSequence" && CFG.layers.radar.framesFile) {
      const framesUrl = CFG._resolved.lessonBase + CFG.layers.radar.framesFile;
      const mf = await safeFetchJson(framesUrl);
      if (mf && Array.isArray(mf.frames)) {
        RADAR_FRAMES = mf.frames.map(f => ({t: new Date(f.t), file: f.file})).filter(f => !isNaN(f.t));
        if (RADAR_FRAMES.length) {
          steps = RADAR_FRAMES.map(f => f.t);
        }
      }
      if (!mf) {
        console.warn("Radar frames manifest not found:", framesUrl);
      } else {
        const arr = Array.isArray(mf) ? mf : (Array.isArray(mf.frames) ? mf.frames : []);
        radarFrames = arr.map((x)=>{
          if (typeof x === "string") return { file: x };
          return x;
        }).filter(x=>x && (x.file || x.url || x.timeZ));
        // Pre-resolve URL for convenience (allow file-only entries)
        for (const f of radarFrames){
          const rel = f.url || f.file || "";
          f.__url = rel.startsWith("http") ? rel : (CFG._resolved.lessonBase + (rel.startsWith("/") ? rel.slice(1) : rel));
        }
        // If timeZ missing, try to parse from filename like radar_YYYYMMDD_HHMMZ.png
        for (const f of radarFrames){
          if (!f.timeZ && f.file){
            const m = String(f.file).match(/(\d{8})_(\d{4})Z/);
            if (m){
              const y=m[1].slice(0,4), mo=m[1].slice(4,6), da=m[1].slice(6,8);
              const hh=m[2].slice(0,2), mm=m[2].slice(2,4);
              f.timeZ = `${y}-${mo}-${da}T${hh}:${mm}:00Z`;
            }
          }
        }
        // Drive time from manifest if it has usable timestamps
        if (radarFrames.length && radarFrames.every(f=>f.timeZ)){
          CFG.layers.radar.frames = radarFrames.map(f=>({timeZ:f.timeZ}));
        } else {
          console.warn("Radar frames manifest loaded, but missing timeZ on one or more entries. Slider will use pattern stepping.");
        }
      }
    }

    // Time
    timeSteps = buildTimeSteps();
    slider.min = 0;
    slider.max = Math.max(0, timeSteps.length - 1);
    slider.value = 0;

    // Layers control
    const baseLayers = {};
    const overlayLayers = {};

    // Radar (image sequence)
    if (CFG.layers?.radar?.type === "imageSequence") {
      const boundsUrl = CFG._resolved.lessonBase + CFG.layers.radar.boundsFile;
      const bounds = await safeFetchJson(boundsUrl);
      if (!bounds) {
        console.warn("Radar bounds not found:", boundsUrl);
      } else {
        const sw = bounds.southWest || bounds.southwest || bounds.SouthWest || bounds.SW || bounds.sw;
        const ne = bounds.northEast || bounds.northeast || bounds.NorthEast || bounds.NE || bounds.ne;
        if (!sw || !ne || (sw.lat === undefined && !Array.isArray(sw))) {
          console.error("Radar bounds JSON shape not recognized. Expected {southWest:{lat,lon}, northEast:{lat,lon}} (or southwest/northeast). Got:", bounds);
        }
        const swLL = Array.isArray(sw) ? sw : [sw.lat, sw.lon ?? sw.lng];
        const neLL = Array.isArray(ne) ? ne : [ne.lat, ne.lon ?? ne.lng];
        const b = L.latLngBounds(swLL, neLL);
        // If frames manifest exists, use the first explicit file; else fall back to pattern.
        const firstUrl = (radarFrames && radarFrames[0] && radarFrames[0].__url)
          ? radarFrames[0].__url
          : (CFG._resolved.lessonBase + buildUrlFromPattern(CFG.layers.radar.framePattern, timeSteps[0]));
        radarOverlay = L.imageOverlay(firstUrl, b, { opacity: CFG.layers.radar.opacityDefault ?? 0.75 });
        radarOverlay.addTo(map);
        overlayLayers["Radar"] = radarOverlay;
        map.fitBounds(b, { padding: [10,10] });
      }
    }

    // METARs (snapshot GeoJSON)
    if (CFG.layers?.metars?.type === "snapshotGeoJSON") {
      metarsLayer = L.geoJSON(null, {
        pointToLayer: (feat, latlng) => L.circleMarker(latlng, { radius: 3 }),
      });
      overlayLayers["METARs"] = metarsLayer;
      metarsLayer.addTo(map);
    }

    // Generic overlays
    if (Array.isArray(CFG.layers?.overlays)) {
      for (const o of CFG.layers.overlays) {
        if (!o?.url || !o?.name) continue;
        const full = CFG._resolved.lessonBase + o.url;
        const gj = await safeFetchJson(full);
        if (!gj) { console.warn("Overlay not found:", full); continue; }
        overlays[o.name] = L.geoJSON(gj);
        overlayLayers[o.name] = overlays[o.name];
      }
    }

    L.control.layers(baseLayers, overlayLayers, { collapsed: false }).addTo(map);

    // Wire time controls
    const applyTimeIndex = async (idx) => {
      const dt = timeSteps[idx];
      timeEl.textContent = formatZToLocal(dt.toISOString(), CFG.time.displayTimezone);

      // radar
      if (radarOverlay) {
        let url = null;
        if (radarFrames && radarFrames[idx] && radarFrames[idx].__url) {
          url = radarFrames[idx].__url;
        } else if (CFG.layers?.radar?.framePattern) {
          url = CFG._resolved.lessonBase + buildUrlFromPattern(CFG.layers.radar.framePattern, dt);
        }
        if (url) radarOverlay.setUrl(url);
      }

      // metars
      if (metarsLayer && CFG.layers?.metars?.snapshotPattern) {
        const rel = buildUrlFromPattern(CFG.layers.metars.snapshotPattern, dt);
        const url = CFG._resolved.lessonBase + rel;
        const gj = await safeFetchJson(url);
        metarsLayer.clearLayers();
        if (gj) metarsLayer.addData(gj);
      }
    };

    slider.addEventListener("input", ()=> applyTimeIndex(Number(slider.value)));
    prevBtn.addEventListener("click", ()=> { slider.value = Math.max(0, Number(slider.value)-1); slider.dispatchEvent(new Event("input")); });
    nextBtn.addEventListener("click", ()=> { slider.value = Math.min(Number(slider.max), Number(slider.value)+1); slider.dispatchEvent(new Event("input")); });

    // initial time
    await applyTimeIndex(0);
  }

  init();
</script>
</body>
</html>
