<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Weather Discovery Lab</title>

<meta name="viewport" content="width=device-width, initial-scale=1"/>

<link
 rel="stylesheet"
 href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>

<style>

html, body {
  margin:0;
  padding:0;
  height:100%;
  font-family: system-ui, Arial, sans-serif;
}

/* Banner */

.tvbanner{
  position:absolute;
  top:0;
  left:0;
  right:0;
  height:76px;
  background:#0b2d4a;
  color:white;
  display:flex;
  align-items:center;
  z-index:1000;
  box-shadow:0 2px 6px rgba(0,0,0,.4);
}

.banner-inner{
  padding-left:16px;
}

.banner-title{
  font-size:22px;
  font-weight:600;
}

.banner-question{
  font-size:14px;
  opacity:.9;
}

/* Map */

#map{
  position:absolute;
  top:76px;
  bottom:0;
  width:100%;
}

</style>
</head>

<body>

<div class="tvbanner">
  <div class="banner-inner">
    <div class="banner-title" id="titleTop"></div>
    <div class="banner-question" id="drivingQuestion"></div>
  </div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script type="module">

import {
  getLessonIdFromURL,
  loadLessonConfig,
  getRadarManifest
} from "./js/lessonLoader.js";

const lessonId = getLessonIdFromURL();

const cfg = await loadLessonConfig({ lessonId });

document.getElementById("titleTop").innerText = cfg.titleTop || "";
document.getElementById("drivingQuestion").innerText = cfg.drivingQuestion || "";

/* Map */

const map = L.map("map").setView(
  [cfg.map.initialView.lat, cfg.map.initialView.lon],
  cfg.map.initialView.zoom
);

L.tileLayer(
  "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
  {
    maxZoom:19,
    attribution:"© OpenStreetMap"
  }
).addTo(map);


/* Radar */

const radarManifest = getRadarManifest(cfg);

if (radarManifest) {

  const bounds = radarManifest.leaflet_bounds;

  const frames = radarManifest.frames;

  let currentFrame = 0;

  let overlay = null;

  function showFrame(i){

    if(overlay){
      map.removeLayer(overlay);
    }

    overlay = L.imageOverlay(
      frames[i].png,
      bounds,
      {opacity:0.75}
    ).addTo(map);

  }

  showFrame(0);

  setInterval(()=>{
    currentFrame++;
    if(currentFrame >= frames.length) currentFrame = 0;
    showFrame(currentFrame);
  }, 1000);

}

</script>

</body>
</html>
