<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather Discovery Lab — Public Demo</title>
  <style>
    :root{
      --bg:#07131f;
      --panel:rgba(7,19,31,.86);
      --panelBorder:rgba(255,255,255,.14);
      --text:#ffffff;
      --muted:rgba(255,255,255,.78);
      --accent:#2db7ff;
      --accent2:#ff3d3d;
    }
    html, body {
      margin: 0;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: "Lato", Arial, sans-serif;
      overflow: hidden;
    }
    #shell {
      position: relative;
      width: 100%;
      height: 100%;
      background: #000;
    }
    #simFrame {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      background: #000;
    }
    .hero-card {
      display: none !important;
    }
    .hero-bar {
      height: 10px;
      background: linear-gradient(90deg, #cf3f1f, #ef7e2d);
    }
    .hero-inner {
      padding: 14px 16px 18px;
      color: #10253d;
    }
    .kicker {
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: rgba(16,37,61,.62);
    }
    .title {
      margin-top: 8px;
      font-size: 28px;
      line-height: 1.02;
      font-weight: 900;
      color: #10253d;
    }
    .sub {
      margin-top: 10px;
      font-size: 15px;
      line-height: 1.4;
      color: rgba(16,37,61,.78);
    }
    .lookfor {
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(12,45,88,.06);
      border: 1px solid rgba(16,36,58,.08);
      font-size: 14px;
      line-height: 1.35;
      color: #10253d;
    }
    .lookfor b { color: #10253d; }
    .demo-controls {
      margin-top: 14px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .demo-btn {
      appearance: none;
      border: 1px solid rgba(255,255,255,.16);
      background: linear-gradient(180deg, rgba(7,31,58,.98), rgba(10,42,82,.96));
      color: #fff;
      border-radius: 999px;
      padding: 11px 16px;
      font: 900 13px/1 Arial, sans-serif;
      letter-spacing: .4px;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(0,0,0,.20);
    }
    .demo-btn.secondary {
      background: linear-gradient(180deg, #42566e, #2f4156 65%, #223244);
    }
    .status {
      position: absolute;
      left: 18px;
      bottom: 18px;
      z-index: 20;
      max-width: min(520px, calc(100vw - 36px));
      border-radius: 16px;
      background: rgba(0,0,0,.5);
      color: rgba(255,255,255,.85);
      border: 1px solid rgba(255,255,255,.08);
      padding: 10px 12px;
      font: 700 12px/1.35 Arial, sans-serif;
      backdrop-filter: blur(6px);
    }
    @media (max-width: 1024px) {
      .status {
        max-width: min(420px, calc(100vw - 24px));
        font-size: 11px;
      }
    }

    @media (max-width: 820px) {
      #simFrame {
        transform: none;
      }
      .status {
        left: 12px;
        right: 12px;
        bottom: 12px;
        max-width: none;
      }
    }

    @media (max-width: 640px) {
      body {
        overflow: hidden;
      }
      .hero-card {
        left: 10px;
        right: 10px;
        width: auto;
        top: auto;
        bottom: 74px;
        border-radius: 18px;
      }
      .hero-inner {
        padding: 12px 12px 14px;
      }
      .title {
        font-size: 22px;
        line-height: 1.05;
      }
      .sub,
      .lookfor,
      .status {
        font-size: 12px;
      }
      .demo-controls {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }
      .demo-btn {
        width: 100%;
        min-height: 44px;
        padding: 12px 12px;
        font-size: 12px;
      }
      .status {
        left: 10px;
        right: 10px;
        bottom: 10px;
        border-radius: 14px;
        padding: 8px 10px;
      }
    }

    @media (max-width: 480px) {
      .hero-card {
        bottom: 68px;
        left: 8px;
        right: 8px;
      }
      .hero-inner {
        padding: 10px 10px 12px;
      }
      .title {
        font-size: 20px;
      }
      .demo-controls {
        grid-template-columns: 1fr;
      }
      .demo-btn {
        min-height: 46px;
        font-size: 12px;
      }
      .status {
        font-size: 11px;
        left: 8px;
        right: 8px;
        bottom: 8px;
      }
    }
  </style>
</head>
<body>
  <div id="shell">
    <iframe
      id="simFrame"
      src="./simulator_v5_7_unsnapped.html?lesson=derecho-2022-demo"
      title="Weather Discovery Lab Public Demo"
      loading="eager"
      referrerpolicy="same-origin"
    ></iframe>

    <div class="hero-card">
      <div class="hero-bar" id="heroBar"></div>
      <div class="hero-inner">
        <div style="display:flex; align-items:flex-start; gap:12px;">
          <div id="stepBubble" style="width:46px; height:46px; border-radius:50%; display:flex; align-items:center; justify-content:center; font:900 20px/1 Lato, Arial, sans-serif; color:#fff; background:rgba(12,45,88,.92); flex:0 0 auto;">4</div>
          <div style="min-width:0;">
            <div class="kicker" id="heroKicker">THE WOW MOMENT</div>
            <div class="title" id="heroTitle">May 12, 2022 Derecho</div>
            <div class="sub" id="heroSub">A first look at a real severe weather event using live-style radar, warnings, and storm reports.</div>
            <div class="lookfor" id="heroLookfor"><b>Look for:</b> the fast-moving radar line, active warnings, and how the storm fills the map around <span id="demoTimeLabel">4:45 PM</span>.</div>
          </div>
        </div>
        <div class="demo-controls">
          <button class="demo-btn secondary" id="prevCardBtn" type="button">Previous</button>
          <button class="demo-btn" id="nextCardBtn" type="button">Next</button>
          <button class="demo-btn" id="dopplerBtn" type="button">LIVE Doppler ON</button>
          <button class="demo-btn secondary" id="refreshSceneBtn" type="button">Refresh Scene</button>
          <button class="demo-btn secondary" id="toggleCaptionBtn" type="button">Hide Caption</button>
        </div>
      </div>
    </div>

    <div class="status" id="demoStatus">Loading public demo scene…</div>
  </div>

  <script>
    (function(){
      var frame = document.getElementById('simFrame');
      var statusEl = document.getElementById('demoStatus');
      var refreshBtn = document.getElementById('refreshSceneBtn');
      var toggleCaptionBtn = document.getElementById('toggleCaptionBtn');
      var prevCardBtn = document.getElementById('prevCardBtn');
      var nextCardBtn = document.getElementById('nextCardBtn');
      var dopplerBtn = document.getElementById('dopplerBtn');
      var heroCard = document.querySelector('.hero-card');
      var heroBar = document.getElementById('heroBar');
      var stepBubble = document.getElementById('stepBubble');
      var heroKicker = document.getElementById('heroKicker');
      var heroTitle = document.getElementById('heroTitle');
      var heroSub = document.getElementById('heroSub');
      var heroLookfor = document.getElementById('heroLookfor');
      var attemptTimer = null;
      var attemptCount = 0;
      var maxAttempts = 60;
      var cardIndex = 3;

      var cards = [
        {
          step: 1,
          kicker: 'SETUP',
          title: 'A Dangerous Setup Is Forming',
          sub: 'Warm, humid air was spreading north while a strong weather system approached the Plains.',
          lookfor: 'Look for: the fronts and where the warm, unstable air sits compared to the boundaries.',
          timeIso: '2022-05-12T18:00:00Z',
          timeLabel: '1:00 PM',
          theme: 'linear-gradient(90deg, #cf7b1f, #efb22d)',
          layers: { radar:false, warnings:false, reports:false, lightning:false, sweep:false, spc:false, metars:false, fronts:true }
        },
        {
          step: 2,
          kicker: 'FORECAST',
          title: 'Forecasters Saw the Risk Early',
          sub: 'This region was highlighted for severe weather before storms fully developed.',
          lookfor: 'Look for: how the forecast risk area lines up with eastern South Dakota and nearby states.',
          timeIso: '2022-05-12T18:05:00Z',
          timeLabel: '1:05 PM',
          theme: 'linear-gradient(90deg, #b53a26, #e4583f)',
          layers: { radar:false, warnings:false, reports:false, lightning:false, sweep:false, spc:true, metars:false, fronts:false }
        },
        {
          step: 3,
          kicker: 'ATMOSPHERE',
          title: 'The Atmosphere Becomes Dangerous',
          sub: 'Moisture was increasing across the region as the afternoon continued.',
          lookfor: 'Look for: richer low-level moisture building into the target area.',
          timeIso: '2022-05-12T18:30:00Z',
          timeLabel: '1:30 PM',
          theme: 'linear-gradient(90deg, #2f8c4b, #54b46d)',
          layers: { radar:false, warnings:false, reports:false, lightning:false, sweep:false, spc:false, metars:true, fronts:false }
        },
        {
          step: 4,
          kicker: 'THE WOW MOMENT',
          title: 'Now the Storm Comes Alive',
          sub: 'Radar, warnings, and reports begin working together as the derecho intensifies.',
          lookfor: 'Look for: the fast-moving radar line, active warnings, and how the storm fills the map around 4:45 PM.',
          timeIso: '2022-05-12T21:45:00Z',
          timeLabel: '4:45 PM',
          theme: 'linear-gradient(90deg, #cf3f1f, #ef7e2d)',
          layers: { radar:true, warnings:true, reports:true, lightning:true, sweep:true, spc:false, metars:false, fronts:false }
        },
        {
          step: 5,
          kicker: 'IMPACT',
          title: 'Real Impact on the Ground',
          sub: 'Storm reports connect the weather map to what was happening in towns and counties on the ground.',
          lookfor: 'Look for: where reports cluster compared with the storm path and warning area.',
          timeIso: '2022-05-12T22:00:00Z',
          timeLabel: '5:00 PM',
          theme: 'linear-gradient(90deg, #6b43b5, #8a63d6)',
          layers: { radar:false, warnings:false, reports:true, lightning:false, sweep:false, spc:false, metars:false, fronts:false }
        }
      ];

      function setStatus(msg){
        if (statusEl) statusEl.textContent = msg;
      }

      function updateCardShell(){
        var card = cards[cardIndex];
        if (!card) return;
        if (heroBar) heroBar.style.background = card.theme;
        if (stepBubble) stepBubble.textContent = String(card.step);
        if (heroKicker) heroKicker.textContent = card.kicker;
        if (heroTitle) heroTitle.textContent = card.title;
        if (heroSub) heroSub.textContent = card.sub;
        if (heroLookfor) heroLookfor.innerHTML = '<b>' + card.lookfor.split(':')[0] + ':</b>' + card.lookfor.substring(card.lookfor.indexOf(':') + 1);
        var t = document.getElementById('demoTimeLabel');
        if (t) t.textContent = card.timeLabel;
      }

      function injectHideCss(doc){
        if (!doc || doc.getElementById('publicDemoHideCss')) return;
        var style = doc.createElement('style');
        style.id = 'publicDemoHideCss';
        style.textContent = [
          '#simAlertBox, #warningCountBox { display:none !important; }',
          '#toolBox { right: 12px !important; top: 12px !important; z-index: 100030 !important; }',
          '#toolBox.is-collapsed .tool-btn, #toolBox.is-collapsed .draw-color-row { display:none !important; }',
          '#toolToggleBtn { display:inline-flex !important; }',
          '.leaflet-top.leaflet-left, .leaflet-top.leaflet-right { margin-top: 8px !important; }'
        ].join('
');
        style.textContent += '
.scrub-wrap, #scrubWrap, #cbScrubber, .product-row, .sim-group-toggle, .product-menu, .sim-product-btn, .clock-stack, #simClockBox, .sim-clock, .sim-clock-label, .scrub-mini { display:none !important; }';
        doc.head.appendChild(style);
      }

      function forceHideChrome(doc){
        if (!doc) return;
        [
          '.product-row', '.scrub-wrap', '#scrubWrap', '#cbScrubber', '.clock-stack', '#simClockBox', '.sim-clock', '.sim-clock-label', '.scrub-mini'
        ].forEach(function(sel){
          try {
            doc.querySelectorAll(sel).forEach(function(el){ el.style.display = 'none'; });
          } catch (e) {}
        });
      }

      function forceCollapseTools(doc){
        if (!doc) return;
        try {
          var toolBox = doc.getElementById('toolBox');
          if (toolBox) {
            toolBox.classList.add('is-collapsed');
            toolBox.style.right = '12px';
            toolBox.style.top = '12px';
          }
          var toggle = doc.getElementById('toolToggleBtn');
          if (toggle) toggle.style.display = 'inline-flex';
        } catch (e) {}
      }

      async function setLayer(fnName, value, cw){
        try {
          if (typeof cw[fnName] === 'function') await cw[fnName](value);
        } catch (e) {}
      }

      async function applyCardToFrame(){
        var cw, doc;
        try {
          cw = frame.contentWindow;
          doc = cw.document;
        } catch (err) {
          setStatus('Waiting for demo frame…');
          return false;
        }
        if (!cw || !doc || !doc.body) {
          setStatus('Waiting for simulator page…');
          return false;
        }

        injectHideCss(doc);
        forceHideChrome(doc);
        forceCollapseTools(doc);
        if (heroCard) heroCard.style.display = 'none';
        updateCardShell();

        if (doc.body) {
          doc.body.classList.add('guide-collapsed');
          doc.body.classList.remove('explore-mode');
        }
        try {
          var toolBox = doc.getElementById('toolBox');
          if (toolBox) {
            toolBox.classList.add('is-collapsed');
            toolBox.style.right = '12px';
            toolBox.style.top = '12px';
          }
        } catch (e) {}

        if (typeof cw.updateAll !== 'function' || typeof cw.setMasterTime !== 'function') {
          setStatus('Waiting for engine functions…');
          return false;
        }

        var card = cards[cardIndex];

        try { if (typeof cw.pauseSimulator === 'function') cw.pauseSimulator(); } catch (e) {}
        try { if (typeof cw.setFreeScrubMode === 'function') cw.setFreeScrubMode(true); } catch (e) {}

        await cw.setMasterTime(new Date(card.timeIso));

        await setLayer('setSpcDay1Enabled', !!card.layers.spc, cw);
        await setLayer('setSatelliteEnabled', false, cw);
        await setLayer('setMetarsEnabled', !!card.layers.metars, cw);
        await setLayer('setObsRadarEnabled', !!card.layers.radar, cw);
        await setLayer('setRadarEnabled', !!card.layers.radar, cw);
        await setLayer('setWarningsEnabled', !!card.layers.warnings, cw);
        await setLayer('setReportsEnabled', !!card.layers.reports, cw);
        await setLayer('setLightningEnabled', !!card.layers.lightning, cw);

        try {
          if (typeof cw.setFrontsEnabled === 'function') await cw.setFrontsEnabled(!!card.layers.fronts);
        } catch (e) {}

        try {
          if (typeof cw.toggleSweep === 'function') {
            if (!!card.layers.sweep && !cw.radarSweepEnabled) cw.toggleSweep();
            if (!card.layers.sweep && cw.radarSweepEnabled) cw.toggleSweep();
          }
        } catch (e) {}

        try { cw.updateAll(); } catch (e) {}
        if (dopplerBtn) dopplerBtn.textContent = cw && cw.radarSweepEnabled ? 'LIVE Doppler ON' : 'LIVE Doppler OFF';
        setStatus('Established story shell active. Toolbar retracted.');
        return true;
      }

      async function runSetupLoop(){
        if (attemptTimer) clearInterval(attemptTimer);
        attemptCount = 0;
        setStatus('Loading public demo scene…');
        attemptTimer = setInterval(async function(){
          attemptCount += 1;
          var ok = await applyCardToFrame();
          if (ok) {
            clearInterval(attemptTimer);
            attemptTimer = null;
          } else if (attemptCount >= maxAttempts) {
            clearInterval(attemptTimer);
            attemptTimer = null;
            setStatus('Demo page loaded, but the stripped public scene needs another pass.');
          }
        }, 500);
      }

      if (refreshBtn) refreshBtn.addEventListener('click', function(){ runSetupLoop(); });
      if (prevCardBtn) prevCardBtn.addEventListener('click', function(){ cardIndex = (cardIndex - 1 + cards.length) % cards.length; runSetupLoop(); });
      if (nextCardBtn) nextCardBtn.addEventListener('click', function(){ cardIndex = (cardIndex + 1) % cards.length; runSetupLoop(); });
      if (dopplerBtn) dopplerBtn.addEventListener('click', function(){
        try {
          var cw = frame.contentWindow;
          if (cw && typeof cw.toggleSweep === 'function') cw.toggleSweep();
          dopplerBtn.textContent = cw && cw.radarSweepEnabled ? 'LIVE Doppler ON' : 'LIVE Doppler OFF';
        } catch (e) {}
      });
      if (toggleCaptionBtn) {
        toggleCaptionBtn.addEventListener('click', function(){
          var hidden = heroCard.style.display === 'none';
          heroCard.style.display = hidden ? '' : 'none';
          toggleCaptionBtn.textContent = hidden ? 'Hide Caption' : 'Show Caption';
        });
      }

      frame.addEventListener('load', function(){ runSetupLoop(); });
      updateCardShell();
    })();
  </script>
</body>
</html>
